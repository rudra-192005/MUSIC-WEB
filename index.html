<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SONIX — Music Player</title>
  <link rel="stylesheet" href="styles/global.css" />
  <link rel="stylesheet" href="styles/player.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <!-- Sidebar Nav -->
    <nav class="sidebar">
      <div class="logo">SONIX</div>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-item active" data-page="player">
          <span class="nav-icon">▶</span><span>Player</span>
        </a></li>
        <li><a href="queue.html" class="nav-item" data-page="queue">
          <span class="nav-icon">≡</span><span>Queue</span>
        </a></li>
        <li><a href="playlist.html" class="nav-item" data-page="playlist">
          <span class="nav-icon">◈</span><span>Playlists</span>
        </a></li>
        <li><a href="userdata.html" class="nav-item" data-page="userdata">
          <span class="nav-icon">◉</span><span>Profile</span>
        </a></li>
        <li><a href="recommendations.html" class="nav-item" data-page="recommendations">
          <span class="nav-icon">◎</span><span>Discover</span>
        </a></li>
      </ul>
      <div class="sidebar-footer">
        <div class="now-playing-mini">
          <div class="mini-cover" id="sidebarCover"></div>
          <div class="mini-info">
            <span class="mini-title" id="sidebarTitle">Midnight Drive</span>
            <span class="mini-artist" id="sidebarArtist">NEON PULSE</span>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <div class="page-player active" id="page-player">

        <!-- Album Art Section -->
        <section class="player-hero">
          <div class="vinyl-wrapper">
            <div class="vinyl-disk" id="vinylDisk">
              <div class="vinyl-label">
                <span class="vinyl-title" id="vinylTitle">MIDNIGHT DRIVE</span>
              </div>
            </div>
            <div class="album-glow" id="albumGlow"></div>
          </div>

          <div class="track-meta">
            <div class="track-badge">NOW PLAYING</div>
            <h1 class="track-title" id="trackTitle">Midnight Drive</h1>
            <p class="track-artist" id="trackArtist">NEON PULSE</p>
            <p class="track-album" id="trackAlbum">Chromatic Nights · 2024</p>

            <div class="track-actions">
              <button class="action-btn" id="likeBtn" onclick="toggleLike()">♡</button>
              <button class="action-btn" onclick="addToPlaylist()">+</button>
              <button class="action-btn" onclick="shareTrack()">⬡</button>
            </div>
          </div>
        </section>

        <!-- Player Controls -->
        <section class="player-controls-section">
          <div class="progress-container">
            <span class="time-label" id="currentTime">0:00</span>
            <div class="progress-bar" id="progressBar" onclick="seek(event)">
              <div class="progress-fill" id="progressFill"></div>
              <div class="progress-thumb" id="progressThumb"></div>
            </div>
            <span class="time-label" id="totalTime">3:42</span>
          </div>

          <div class="controls-row">
            <button class="ctrl-btn secondary" id="shuffleBtn" onclick="toggleShuffle()" title="Shuffle">⇄</button>
            <button class="ctrl-btn" onclick="prevTrack()" title="Previous">⏮</button>
            <button class="ctrl-btn play-pause" id="playPauseBtn" onclick="togglePlay()">▶</button>
            <button class="ctrl-btn" onclick="nextTrack()" title="Next">⏭</button>
            <button class="ctrl-btn secondary" id="repeatBtn" onclick="toggleRepeat()" title="Repeat">↺</button>
          </div>

          <div class="volume-row">
            <span class="vol-icon">🔈</span>
            <div class="volume-bar" id="volumeBar" onclick="setVolume(event)">
              <div class="volume-fill" id="volumeFill" style="width:70%"></div>
            </div>
            <span class="vol-icon">🔊</span>
          </div>
        </section>

        <!-- Up Next Strip -->
        <section class="up-next-strip">
          <h3 class="strip-label">UP NEXT</h3>
          <div class="next-tracks" id="nextTracks"></div>
        </section>

      </div>
    </main>
  </div>

  <!-- Audio visualizer canvas -->
  <canvas id="visualizer" class="visualizer-canvas"></canvas>

  <script src="scripts/data.js"></script>
  <script src="scripts/player.js"></script>
</body>
</html>
